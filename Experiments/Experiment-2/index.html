<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">TechStore</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="#">About</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card">
          <img src="laptop.jpg" class="card-img-top" alt="Laptop">
          <div class="card-body">
            <h5 class="card-title">Laptop <span class="badge bg-success">New</span></h5>
            <p class="card-text">High performance laptop</p>
            <p>₹50,000</p>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal">View Details</button>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card">
          <img src="mobile.jpg" class="card-img-top" alt="Mobile" >
          <div class="card-body">
            <h5 class="card-title">Mobile <span class="badge bg-danger">Sale</span></h5>
            <p class="card-text">Latest smartphone</p>
            <p>₹30,000</p>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal">View Details</button>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card">
          <img src="headphones.jpg" class="card-img-top" alt="Headphones" >
          <div class="card-body">
            <h5 class="card-title">Headphones <span class="badge bg-success">New</span></h5>
            <p class="card-text">Noise cancelling</p>
            <p>₹5,000</p>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal">View Details</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="bg-dark text-white text-center p-3">
    <p>@ 2026 TechStore | Follow us on social media</p>
  </footer>

  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Product Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p>More information about the product will go here.</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
